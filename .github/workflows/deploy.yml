name: Deploy Winner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -eu
            cd /www/wwwroot/winner
            mkdir -p .deploy-backups
            timestamp=$(date +%Y%m%d-%H%M%S)
            git diff > ".deploy-backups/pre-deploy-${timestamp}.patch" || true
            git fetch origin
            git reset --hard origin/main
            npm ci
            npm run build
            export PORT=3002
            if pm2 describe winner >/dev/null 2>&1; then
              pm2 restart winner --update-env
            else
              pm2 start npm --name winner -- start
            fi
            pm2 save
            curl -I --max-time 10 http://127.0.0.1:3002
